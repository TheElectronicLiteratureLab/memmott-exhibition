				byline: 'by Dene Grigar, Curator at The NEXT and Director of the Electronic Literature Lab',
				body: [
					'During the Traversals of Talan Memmott\'s net art pieces that took place in summer 2025 in the Electronic Literature Lab, I realized that The NEXT held, among its 47 collections, some of the only copies of his prodigious output––and just 13 works, at that. Those of us who cut our teeth on pioneering works produced for the Web in the late 1990s and early 2000s, replete with their ingenious programming and ground-breaking design, know their contributions to art and digital culture and understand the impetus for holding on to Talan\'s works and showcasing them for later audiences to explore and enjoy. Criticism by N. Katherine Hayles, Lisa Swanstrom, Mark Marino, and others who mark the genius of Talan\'s art and establish his output as canonical for the field drive us even more resolutely toward holding on to them.',
					'The title "Talan Memmott: Works on Screen, 1998-2016," directly borrows from titles used to describe the mediums on which fine art is produced, such as "works on paper." A trained artist who was the first graduate fellow in electronic writing at Brown University and received an MFA from the university in Literary Arts and Electronic Writing in 2004, Talan established himself, early on, as a net artist whose medium of production is the computer. Put simply, the screen serves as his canvas, and the area of the monitor outlining it, his frame. One can get a sense of this concept when looking at the landing screen of "Lexia to Perplexia" where he states that the work is intended for a screen resolution of 1024 x 768. In 2000 a viewer using a standard 15" Apple Studio Display would, indeed, experience the work in the way he had developed it. However, those accessing it on the 17" Apple Cinema display that was also available at the time whose resolution is 1280 x 1024 (and higher) or any of us today looking at it on a display with a 1768 x 1117 resolution would experience a work that looks smaller than he had intended it. Thus, like water colorists who use 100% cotton paper because of its strength, absorption, and other desirable features and avoid printer paper due to buckling, sizing constraints, and other undesirable features, net artists like Talan take advantage of the medium\'s affordances, such as screen properties, when producing their art. His art is "for the screen."',
					'Because Talan\'s works in The NEXT belong to seven of its collections and not contained in a collection of their own, we thought the best way to honor his contributions and vision was to mount one of our "Treasures" exhibitions, featuring all his works we are currently holding in our collections. This approach means that visitors will find 13 works that explore the aesthetic of code, language, and code language, starting in 1998 with "Bread.Crumbs" and "Jilt; a Romance," both published in <em>BeeHive</em>. Also showcased are "Delimited Meshings," "Minute," and "Trimalchio\'s Diet," which appear in <em>Cauldron & Net</em> and <em>BeeHive</em> in 1999. "Reasoned Metagoria," "LUX: Bronzino 1540," and "Translucidity" were published in 2000 in <em>frAme</em> and <em>Riding the Meridian</em>. "Lexia to Perplexia" and "Self Portrait(s) [as Others(s)]" in 2000, both in <em>Riding the Meridian</em>. The last two works, "Toy Garbage" and "Dérivepedia" were published a decade or more later in 2011 and 2016 in the <em>Electronic Literature Collection 3</em> and <em>The New River</em>, respectively. Know that we are in the process of locating more of his works so that we can fill the missing gaps in our collection.',
					'Scholars interested in digital culture and digital publishing should also find the exhibition compelling from the standpoint of the journals in which Talan presented his work. For example, BeeHive, edited by Talan, published the most number of works of all 10 journals collected in The NEXT––a total of 272. It was active for six years, and, along with <em>The New River</em> (1996) and <em>Cauldron & Net</em> (1997), marks one of the earliest. Likewise, <em>frAme</em>, the first documented online journal from the UK, was founded by Sue Thomas and supported through the organization she directed, the trAce Online Writing Centre. Talan published three works during that journal\'s three-year history. Also important to point out is that the oldest journal in The NEXT\'s collection, <em>The New River</em>, remains its longest lived, publishing from 1996 to the present day. Talan\'s most recent work, "Dérivepedia," appears in it in 2016.',
					'We are fortunate that Talan created most of his works in the open Web languages, HTML and JavaScript (JS). This means that net art, like "Jilt; A Romance," have endured over time. He did, however, experiment with DHMTL with six pieces––"Lexia to Perplexia," "LUX: Bronzino 1540," "Reasoned Metagoria," "Lolli\'s Apartment," "Delimited Meshings," and "Bread.Crumbs." Though not a separate language from HTML, DHTML combined HTML, CSS, and JS in a way that made early interactivity possible for browsers like Internet Explorer and Netscape. Updates to browsers over the years, due to security issues and the browser wars, have rendered works produced with DHTML partially or completely inaccessible. With the support of a grant from the Society of American Archivists (SAA), the lab was able to document them via formal Traversals with Talan performing the work through video recordings. Finally, Talan also experimented with Flash for one work we have in The NEXT, "Translucidity." Because this platform is no longer supported on browsers, the lab preserved it using Ruffle, a now common method for making Flash works accessible on the Web.',
					'Speaking about Traversals produced for Talan\'s work, it is important to note that the lab followed the process laid out by Stuart Moulthrop and me for the Pathfinders methodology developed in 2013, onward. This process requires that the work is documented through a video recording of the author or a reader performing it on hardware and with the software that would have been used to experience it when it was first made available to the public. In the case of Talan\'s works, the lab used two different computers for the Traversals: the Apple G4 Flat Panel, released in 2002 and running MacOS 10.3.9; and the G4 "Mirrored Drive Door" (MDD) Tower, released in 2002 and running Mac OS 10.4.6. Both computers were originally shipped with IE 5.0, but we needed to use the earlier 4.5 version because of the substantial changes from 4.5 to 5.0 affected the work, namely to its text size and resolution. "Lexia to Perplexia," which is still found online but only partially functional today on the contemporary browser, can be experienced more fully on the G4 Tower running this software locally.',
					'While the exhibition opened on March 3 in The NEXT with 13 works, we are planning a second phase to launch with the Electronic Literature Organization\'s Media Arts Festival in July. This second version of the exhibition will include critical essays from our collections as well as contemporary ones we commission; video testimonials by scholars and artists; and additional works donated to The NEXT, most recently "Twittering," that Talan has gifted us in January 2026. A video recording of the launch for phase one of the exhibition taking place on March 3 will also be included as part of our documentation.',
					'Thanks and appreciation need to be given to the SAA, which allowed for the lab to use the remaining funds from our grant in support of this exhibition. To Talan for working so closely with us to document his work via the Traversals last summer and his guidance in mounting this exhibition. To Holly Slocum, the Electronic Literature Lab\'s Senior Designer, who produced this gorgeous exhibition site and coded the HTML, CSS, and JS for it. To James Lesperance, the lab\'s Programmer and Preservationist who made sure works were accessible to the public. To Evan Leyden, the lab\'s 2D Animator and Junior Designer who produced the animated banner for The NEXT and GIFs. To Greg Philbrook, the lab\'s Tech Guru who ensured the site functioned in The NEXT and is stored for long-term access. Finally, we thank Washington State University Vancouver for its support of the lab, The NEXT, and my research.'
				]

				imageCaption: 'Screenshot of Delimited Meshings (2001), published in Cauldron & Net, Vol. 3, Issue 1.',
				description: 'Produced in the period he created Translucidity and Lexia to Perplexia, "Delimited Meshings" continues with Memmott\'s exploration of the conditions of textuality inside a computational system, specifically at how meaning is produced when language is entangled with code, interface behavior, and user interaction. At a surface level, the work presents fragments of poetic or theoretical language that appear, shift, overlap, or transform as the reader interacts with the screen. There is no stable plot, no fixed protagonist, and no clear sequence of events. Instead, the text behaves dynamically. Words and phrases are activated or altered through mouse movement, clicks, or scripted processes. The "meshings" of the title refer to these interlacings: textual fragments mesh with interface mechanics; reader actions mesh with programmed responses; semantic meaning meshes with visual and procedural effects. Conceptually, the work addresses distributed subjectivity and networked identity. The reader is not positioned outside the system as a detached observer but becomes implicated in the generation of textual events. Meaning emerges from interaction rather than from linear exposition, underscoring the instability of authorship and the porous boundary between human intention and machine execution. It can also be read as a meditation on digital environments themselves. The piece foregrounds complexity, density, and interference—suggesting that networked systems are layered, recursive, and resistant to singular interpretation. Rather than telling a story, it stages an encounter with the computational conditions that make digital storytelling possible.',

				description: '"Minute" is a brief, deliberately paced piece of early web-based electronic literature that foregrounds the passage of time as its primary aesthetic and conceptual concern. It unfolds over approximately one minute of interaction, during which words and micro-textual fragments animate the screen and respond to temporal progression in ways that make the experience itself the subject. The web interface is not simply a delivery mechanism but an active component of the piece: text elements appear, collide, and fade almost as if caught in an environment governed by duration rather than by narrative sequence. Rather than telling a linear story, "Minute" uses fleeting textual events to make the reader aware of time\'s material qualities in a digital medium. In this regard, the work aligns closely with experimental tendencies in e-poetry that emphasize <em>process and temporal structure</em> over traditional narrative or character development. Time becomes a perceptual site: the reader watches words emerge and dissolve, registering brief instants before they depart, echoing analogous explorations of <em>small units of language and duration</em> discussed in broader analyses of Memmott\'s practice. Visually and functionally, "Minute" occupies the space between poem, performance, and digital animation. It invites readers to experience text as fleeting phenomena — not static artifacts but temporal gestures shaped by their duration. In doing so, it highlights how electronic literature can use duration itself as a compositional material, revealing temporal texture as essential to meaning in digital texts.',

		function buildNav() {
			_navList.innerHTML = works.map(function (work, i) {
				var isCurrent = i === currentIndex;
				return '<li' + (isCurrent ? ' class="active"' : '') + '>' +
					'<a href="#" data-index="' + i + '"' +
					(isCurrent ? ' aria-current="true"' : '') +
					'>' + esc(work.title) + (isCurrent ? ' &lt;' : '') + '</a></li>';
			}).join('');
		}

		_navList.addEventListener('click', function (e) {
			var link = e.target.closest('a[data-index]');
			if (!link) return;
			e.preventDefault();
			(window.navigateTo || navigateTo)(parseInt(link.getAttribute('data-index'), 10));
			menuToggle.setAttribute('aria-expanded', 'false');
			sidebarNav.classList.remove('is-open');
		});

		function updateNav(index) {
			_navList.querySelectorAll('li').forEach(function (li, i) {
				var isCurrent = i === index;
				var link = li.querySelector('a');
				li.classList.toggle('active', isCurrent);
				if (isCurrent) {
					link.setAttribute('aria-current', 'true');
				} else {
					link.removeAttribute('aria-current');
				}
				link.textContent = works[i].title + (isCurrent ? ' <' : '');
			});
		}

		function updateNextBtn(index) {
			var next = index + 1;
			if (next < works.length) {
				_nextBtn.removeAttribute('disabled');
				_nextBtn.setAttribute('aria-label', 'Next work: ' + works[next].title);
			} else {
				_nextBtn.setAttribute('disabled', '');
				_nextBtn.setAttribute('aria-label', 'No further works');
			}
		}

		function updateBgText(currentIdx) {
			var pool = works.filter(function (w, i) {
				return i !== currentIdx && w.type === 'work';
			});
			for (var i = pool.length - 1; i > 0; i--) {
				var j = Math.floor(Math.random() * (i + 1));
				var tmp = pool[i]; pool[i] = pool[j]; pool[j] = tmp;
			}
			[0, 1, 2].forEach(function (col) {
				var el = document.getElementById('bg-col-' + col);
				if (el && pool[col]) el.innerHTML = '<p>' + pool[col].description + '</p>';
			});
		}

		function navigateTo(index) {
			if (index < 0 || index >= works.length) return;
			currentIndex = index;
			updateBgText(index);

			_article.classList.add('is-transitioning');

			setTimeout(function () {
				_article.innerHTML = renderWorkHTML(works[index]);
				updateNav(index);
				updateNextBtn(index);
				_liveRegion.textContent = works[index].title + ' selected';
				_article.classList.remove('is-transitioning');

				var heading = document.getElementById('work-heading');
				if (heading) {
					heading.setAttribute('tabindex', '-1');
					heading.focus({ preventScroll: true });
				}
			}, 180);
		}

		var menuToggle = document.querySelector('.menu-toggle');
		var sidebarNav = document.getElementById('sidebar-nav');

		menuToggle.addEventListener('click', function () {
			var expanded = this.getAttribute('aria-expanded') === 'true';
			this.setAttribute('aria-expanded', String(!expanded));
			sidebarNav.classList.toggle('is-open', !expanded);
		});

		_nextBtn.addEventListener('click', function () {
			if (currentIndex + 1 < works.length) (window.navigateTo || navigateTo)(currentIndex + 1);
		});

		buildNav();
		navigateTo(currentIndex);
	</script>

				}).join('');
			}

			function updateArrows() {
				var atStart = mediaIndex === 0;
				var atEnd = mediaIndex === activeWork.media.length - 1;
				gsap.to(lbPrev, { opacity: atStart ? 0.2 : 1, duration: 0.15 });
				gsap.to(lbNext, { opacity: atEnd ? 0.2 : 1, duration: 0.15 });
				lbPrev.disabled = atStart;
				lbNext.disabled = atEnd;
			}

			function applyMedia(item) {
				lbImg.style.display = 'none';
				lbVideo.style.display = 'none';
				lbIframe.style.display = 'none';
				lbVideo.pause();
				lbVideo.src = '';
				lbIframe.src = '';

				if (item.type === 'video') {
					lbVideo.style.display = 'block';
					lbVideo.src = item.src;
					if (item.poster) lbVideo.poster = item.poster;
					lbVideo.load();
				} else if (item.type === 'vimeo' || item.type === 'iframe') {
					lbIframe.style.display = 'block';
					lbIframe.src = item.src;
					lbIframe.title = item.label || item.alt || 'Work';
					if (item.type === 'iframe') {
						lbIframe.setAttribute('tabindex', '0');
						lbIframe.addEventListener('load', function onLoad() {
							lbIframe.focus({ preventScroll: true });
							lbIframe.removeEventListener('load', onLoad);
						});
					}
				} else {
					lbImg.style.display = 'block';
					lbImg.src = item.src;
					lbImg.alt = item.alt || '';
				}
			}

			function buildStrip() {
				lbStrip.innerHTML = activeWork.media.map(function (item, i) {
					var isTraversal = item.type === 'vimeo';
					var isVideo = item.type === 'video';
					var isWork = item.type === 'iframe';
					var label = isTraversal ? 'Traversal' : (isWork ? 'View Work' : (isVideo ? 'Video ' + (i + 1) : 'Image ' + (i + 1)));
					var icon = (isVideo || isTraversal) ? '▶' : (isWork ? '⇱' : '◼');
					return '<button class="lb-strip-item" data-index="' + i + '" aria-label="' + label + '">'
						+ '<span class="lb-strip-icon" aria-hidden="true">' + icon + '</span>'
						+ '<span class="lb-strip-label">' + label + '</span>'
						+ '</button>';
				}).join('');
			}

			lbStrip.addEventListener('click', function (e) {
				var btn = e.target.closest('.lb-strip-item');
				if (btn) {
					e.stopPropagation();
					goTo(parseInt(btn.getAttribute('data-index'), 10));
				}
			});

			function updateStrip() {
				lbStrip.querySelectorAll('.lb-strip-item').forEach(function (btn, i) {
					var active = i === mediaIndex;
					btn.classList.toggle('is-active', active);
					if (active) {
						btn.setAttribute('aria-current', 'true');
					} else {
						btn.removeAttribute('aria-current');
					}
				});
			}

			function goTo(index) {
				if (isAnimating || index < 0 || index >= activeWork.media.length) return;
				gsap.killTweensOf(lbMediaWrap);
				mediaIndex = index;
				gsap.to(lbMediaWrap, {
					opacity: 0, duration: 0.18,
					onComplete: function () {
						applyMedia(activeWork.media[mediaIndex]);
						updateArrows();
						updateStrip();
						gsap.to(lbMediaWrap, { opacity: 1, duration: 0.18 });
					}
				});
			}

			function openLightbox(imgEl) {
				if (isAnimating) return;
				isAnimating = true;
				sourceImg = imgEl;
				activeWork = works[currentIndex];
				mediaIndex = 0;

				populateInfo(activeWork);
				gsap.set(lbMediaWrap, { opacity: 1 });
				applyMedia(activeWork.media[0]);
				buildStrip();
				updateStrip();

				var rect = imgEl.getBoundingClientRect();
				imgEl.style.opacity = '0';

				var reduceMotion = _reduceMotion.matches;
				gsap.set(lightbox, {
					display: 'block',
					left: reduceMotion ? 0 : rect.left,
					top: reduceMotion ? 0 : rect.top,
					width: reduceMotion ? window.innerWidth : rect.width,
					height: reduceMotion ? window.innerHeight : rect.height
				});
				gsap.set([lightboxClose, lightboxInfo, lbPrev, lbNext, lbStrip], { opacity: 0 });
				_mainContent.inert = true;
				_sidebarNav.inert = true;
				_header.inert = true;

				gsap.to(lightbox, {
					left: 0, top: 0,
					width: window.innerWidth,
					height: window.innerHeight,
					duration: reduceMotion ? 0 : 0.55,
					ease: 'power3.inOut',
					onComplete: function () {
						var hasMultiple = activeWork.media.length > 1;
						gsap.to([lightboxInfo, lbStrip, lightboxClose], { opacity: 1, duration: 0.25, stagger: 0.05 });
						gsap.to(lbPrev, { opacity: hasMultiple ? 0.2 : 0, duration: 0.25 });
						gsap.to(lbNext, { opacity: hasMultiple ? 1 : 0, duration: 0.25 });
						lightboxClose.focus();
						isAnimating = false;
					}
				});
			}

			function closeLightbox() {
				if (isAnimating || !sourceImg) return;
				isAnimating = true;
				lbVideo.pause();

				_mainContent.inert = false;
				_sidebarNav.inert = false;
				_header.inert = false;

				var rect = sourceImg.getBoundingClientRect();

				gsap.to([lightboxClose, lightboxInfo, lbPrev, lbNext, lbStrip], {
					opacity: 0, duration: 0.15,
					onComplete: function () {
						gsap.to(lightbox, {
							left: _reduceMotion.matches ? 0 : rect.left,
							top: _reduceMotion.matches ? 0 : rect.top,
							width: _reduceMotion.matches ? window.innerWidth : rect.width,
							height: _reduceMotion.matches ? window.innerHeight : rect.height,
							duration: _reduceMotion.matches ? 0 : 0.5,
							ease: 'power3.inOut',
							onComplete: function () {
								gsap.set(lightbox, { display: 'none' });
								lbVideo.src = '';
								lbIframe.src = '';
								var returning = sourceImg;
								if (returning) {
									returning.style.opacity = '';
									returning.focus({ preventScroll: true });
								}
								sourceImg = null;
								activeWork = null;
								isAnimating = false;
								if (lbInfoCollapsed) {
									lbInfoCollapsed = false;
									lightboxInfo.classList.remove('is-collapsed');
									lbInfoToggle.setAttribute('aria-expanded', 'true');
									lbInfoToggle.setAttribute('aria-label', 'Hide metadata');
									lbInfoToggle.classList.remove('is-up');
								}
							}
						});
					}
				});
			}

			lbPrev.addEventListener('click', function (e) { e.stopPropagation(); goTo(mediaIndex - 1); });
			lbNext.addEventListener('click', function (e) { e.stopPropagation(); goTo(mediaIndex + 1); });

			lightboxClose.addEventListener('click', function (e) { e.stopPropagation(); closeLightbox(); });

			lightbox.addEventListener('click', function (e) {
				var skip = [lbVideo, lbPrev, lbNext, lightboxClose, lightboxInfo];
				if (!skip.some(function (el) { return el.contains(e.target); })) closeLightbox();
			});

			document.addEventListener('keydown', function (e) {
				if (!sourceImg) return;
				if (e.key === 'Escape') closeLightbox();
				if (e.key === 'ArrowLeft') goTo(mediaIndex - 1);
				if (e.key === 'ArrowRight') goTo(mediaIndex + 1);
			});

			_article.addEventListener('click', function (e) {
				if (e.target.classList.contains('work-image')) openLightbox(e.target);
			});

			var lbInfoToggle = document.getElementById('lb-info-toggle');
			var lbInfoCollapsed = false;

			lbInfoToggle.addEventListener('click', function (e) {
				e.stopPropagation();
				lbInfoCollapsed = !lbInfoCollapsed;
				lightboxInfo.classList.toggle('is-collapsed', lbInfoCollapsed);
				lbInfoToggle.setAttribute('aria-expanded', String(!lbInfoCollapsed));
				lbInfoToggle.setAttribute('aria-label', lbInfoCollapsed ? 'Show metadata' : 'Hide metadata');
				lbInfoToggle.classList.toggle('is-up', lbInfoCollapsed);
			});

			// Debounced resize: keep open lightbox filling the viewport
			var _resizeTimer;
			window.addEventListener('resize', function () {
				if (!sourceImg) return;
				clearTimeout(_resizeTimer);
				_resizeTimer = setTimeout(function () {
					gsap.set(lightbox, {
						left: 0, top: 0,
						width: window.innerWidth,
						height: window.innerHeight
					});
				}, 100);
			});

			var _origNav = navigateTo;
			window.navigateTo = function (index) {
				if (sourceImg) {
					lbVideo.pause();
					lbVideo.src = '';
					lbIframe.src = '';
					gsap.set(lightbox, { display: 'none' });
					sourceImg.style.opacity = '';
					_mainContent.inert = false;
					_sidebarNav.inert = false;
					_header.inert = false;
					sourceImg = null; activeWork = null; isAnimating = false;
				}
				_origNav(index);
			};
		}());
	</script>


	<div id="eye-line" aria-hidden="true"></div>

	<script>
		(function () {
			var eyeBtn = document.getElementById('eye-btn');
			var eyeLine = document.getElementById('eye-line');
			var lineOpen = false;

			function getEyeCenter() {
				var rect = eyeBtn.getBoundingClientRect();
				return {
					x: rect.left + rect.width / 2,
					y: rect.top + rect.height / 2
				};
			}

			var _eyeResizeTimer;
			window.addEventListener('resize', function () {
				if (!lineOpen) return;
				clearTimeout(_eyeResizeTimer);
				_eyeResizeTimer = setTimeout(function () {
					var c = getEyeCenter();
					eyeLine.style.top = (c.y - 4) + 'px';
					eyeLine.style.right = (window.innerWidth - c.x + 6) + 'px';
				}, 100);
			});

			eyeBtn.addEventListener('click', function () {
				var c = getEyeCenter();

				// Position line: right edge anchored to eye, extends leftward; offset up/left
				eyeLine.style.top = (c.y - 4) + 'px';
				eyeLine.style.left = '0';
				eyeLine.style.right = (window.innerWidth - c.x + 6) + 'px';

				if (!lineOpen) {
					lineOpen = true;
					eyeBtn.setAttribute('aria-pressed', 'true');
					gsap.set(eyeLine, { scaleX: 0, transformOrigin: 'right center', display: 'block' });
					gsap.to(eyeLine, { scaleX: 1, duration: 0.65, ease: 'power3.out' });
				} else {
					lineOpen = false;
					eyeBtn.setAttribute('aria-pressed', 'false');
					gsap.to(eyeLine, {
						scaleX: 0,
						transformOrigin: 'right center',
						duration: 0.45,
						ease: 'power3.in',
						onComplete: function () { gsap.set(eyeLine, { display: 'none' }); }
					});
				}
			});
		}());
	</script>
	<script src="https://player.vimeo.com/api/player.js"></script>
